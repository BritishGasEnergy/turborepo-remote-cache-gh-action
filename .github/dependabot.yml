version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    allow:
      - dependency-type: "direct"
  - package-ecosystem: "npm"
    cooldown:
      default-days: 30
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch
      npm-production:
        dependency-type: production
        update-types:
          - patch
